version: '3.8'

# EC2-Specific Docker Compose Configuration
# Handles dynamic IP changes automatically

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: student_mysql
    hostname: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password123}
      MYSQL_DATABASE: ${DB_NAME:-student_registration}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - student_network
    restart: unless-stopped

  # Node.js Backend API
  backend:
    build: ./backend
    container_name: student_backend
    hostname: backend
    environment:
      DB_HOST: mysql
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password123}
      DB_NAME: ${DB_NAME:-student_registration}
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - student_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      timeout: 10s
      retries: 5
      interval: 10s

  # Nginx Frontend
  frontend:
    build: ./frontend
    container_name: student_frontend
    hostname: frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - student_network
    restart: unless-stopped
    environment:
      # Pass environment variables for template substitution
      BACKEND_HOST: backend
      BACKEND_PORT: 5000

volumes:
  mysql_data:
    driver: local

networks:
  student_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
