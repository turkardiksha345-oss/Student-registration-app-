<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <h1>🎓 Student Registration System</h1>
                <p>Join our institution today</p>
            </div>
        </header>

        <main>
            <div class="content-wrapper">
                <!-- Registration Form Section -->
                <section class="form-section">
                    <h2>Register New Student</h2>
                    <form id="registrationForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="name">Full Name *</label>
                                <input type="text" id="name" name="name" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" required>
                            </div>

                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" name="phone" required>
                            </div>

                            <div class="form-group">
                                <label for="dateOfBirth">Date of Birth *</label>
                                <input type="date" id="dateOfBirth" name="dateOfBirth" required>
                            </div>

                            <div class="form-group">
                                <label for="gender">Gender *</label>
                                <select id="gender" name="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" name="address" required>
                            </div>

                            <div class="form-group">
                                <label for="city">City *</label>
                                <input type="text" id="city" name="city" required>
                            </div>

                            <div class="form-group">
                                <label for="state">State/Province *</label>
                                <input type="text" id="state" name="state" required>
                            </div>

                            <div class="form-group">
                                <label for="zipCode">Zip/Postal Code *</label>
                                <input type="text" id="zipCode" name="zipCode" required>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Register Student</button>
                            <button type="reset" class="btn btn-secondary">Clear Form</button>
                        </div>
                    </form>
                    <div id="message" class="message-box" style="display: none;"></div>
                </section>

                <!-- Students List Section -->
                <section class="students-section">
                    <h2>Registered Students</h2>
                    <div class="students-controls">
                        <button id="refreshBtn" class="btn btn-small">🔄 Refresh List</button>
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Search students by name or email...">
                        </div>
                    </div>
                    <div id="studentsList" class="students-table-wrapper">
                        <p class="loading">Loading students...</p>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Student Registration System. All rights reserved.</p>
        </footer>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Student Details</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="editName">Full Name *</label>
                        <input type="text" id="editName" required>
                    </div>

                    <div class="form-group">
                        <label for="editEmail">Email Address *</label>
                        <input type="email" id="editEmail" required>
                    </div>

                    <div class="form-group">
                        <label for="editPhone">Phone Number *</label>
                        <input type="tel" id="editPhone" required>
                    </div>

                    <div class="form-group">
                        <label for="editDateOfBirth">Date of Birth *</label>
                        <input type="date" id="editDateOfBirth" required>
                    </div>

                    <div class="form-group">
                        <label for="editGender">Gender *</label>
                        <select id="editGender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="editAddress">Street Address *</label>
                        <input type="text" id="editAddress" required>
                    </div>

                    <div class="form-group">
                        <label for="editCity">City *</label>
                        <input type="text" id="editCity" required>
                    </div>

                    <div class="form-group">
                        <label for="editState">State/Province *</label>
                        <input type="text" id="editState" required>
                    </div>

                    <div class="form-group">
                        <label for="editZipCode">Zip/Postal Code *</label>
                        <input type="text" id="editZipCode" required>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
