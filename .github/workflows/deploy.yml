name: DevSecOps Pipeline

on:
 push:
  branches: [ "main" ]

jobs:
 devsecops:
  runs-on: ubuntu-latest
  
  steps:

  # 1. Checkout Code
  - name: Checkout Code
    uses: actions/checkout@v3

  # 2. Setup Node.js
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  # 3. Install Backend Dependencies
  - name: Install Dependencies
    run: |
      cd backend
      npm install

  # 4. Dependency Scan (npm audit)
  - name: Dependency Scan
    run: |
      cd backend
      npm audit --audit-level=high || true

  # 5. Secret Scan (Gitleaks)
  - name: Secret Scan
    uses: gitleaks/gitleaks-action@v2

  # 6. SonarCloud Scan (SAST)
  - name: SonarCloud Scan
    uses: SonarSource/sonarcloud-github-action@master
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    with:
      args: >
        -Dsonar.organization=turkardiksha345-oss
        -Dsonar.projectKey=turkardiksha345-oss_student-registration-app-
        -Dsonar.sources=backend,frontend

  # 7. Sonar Quality Gate
  - name: Sonar Quality Gate
    uses: SonarSource/sonarcloud-quality-gate-action@master
    timeout-minutes: 5
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 8. Docker Login
  - name: Docker Login
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  # 9. Build & Push Docker Images
  - name: Build and Push Images
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/student-backend:latest ./backend
      docker build -t ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest ./frontend

      docker push ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
      docker push ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest

  # 10. Scan Docker Image (Trivy)
  - name: Scan Backend Image
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
      format: table
      exit-code: 1
      severity: CRITICAL,HIGH

  # 11. Deploy to EC2
  - name: Deploy to EC2
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        cd student-registration-app

        docker pull ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
        docker pull ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest

        docker-compose -f docker-compose.ec2.yml down
        docker-compose -f docker-compose.ec2.yml up -d

  # 12. DAST Scan (OWASP ZAP)
  - name: OWASP ZAP Scan
    uses: zaproxy/action-full-scan@v0.7.0
    with:
      target: http://${{ secrets.EC2_IP }}
