name: DevSecOps Pipeline

on:
 push:
  branches: [ "main" ]

permissions:
 issues: write
 contents: read

jobs:
 devsecops:
  runs-on: ubuntu-latest

  steps:

  # 1. Checkout Code (Fix for Gitleaks)
  - name: Checkout Code
    uses: actions/checkout@v3
    with:
      fetch-depth: 0

  # 2. Setup Node
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  # 3. Install Dependencies
  - name: Install Dependencies
    run: |
      cd backend
      npm install

  # 4. Dependency Scan
  - name: npm Audit
    run: |
      cd backend
      npm audit --audit-level=high || true

  # 5. Secret Scan
  - name: Gitleaks Scan
    uses: gitleaks/gitleaks-action@v2
    continue-on-error: true

  # 6. SonarCloud (SAST)
  - name: SonarCloud Scan
    uses: SonarSource/sonarcloud-github-action@master
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 7. Docker Login
  - name: Docker Login
    run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

  # 8. Build & Push Images
  - name: Build and Push Images
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/student-backend:latest ./backend
      docker build -t ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest ./frontend

      docker push ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
      docker push ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest

  # 9. Trivy Scan (Container)
  - name: Trivy Scan
    uses: aquasecurity/trivy-action@master
    with:
      image-ref: ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
      severity: CRITICAL
      ignore-unfixed: true

  # 10. Snyk Dependency Scan
  - name: Snyk Code Scan
    uses: snyk/actions/node@master
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    with:
      command: test
    continue-on-error: true

  # 11. Snyk Container Scan
  - name: Snyk Docker Scan
    uses: snyk/actions/docker@master
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    with:
      image: ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
    continue-on-error: true

  # 12. Deploy to EC2
  - name: Deploy to EC2
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        cd /home/ubuntu/Student-registration-app-

        docker pull ${{ secrets.DOCKER_USERNAME }}/student-backend:latest
        docker pull ${{ secrets.DOCKER_USERNAME }}/student-frontend:latest

        docker-compose -f docker-compose.ec2.yml down
        docker-compose -f docker-compose.ec2.yml up -d

  # 13. Verify Containers
  - name: Verify Containers
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        echo "📦 Running Containers:"
        docker ps

  # 14. Check Backend Health
  - name: Check Backend Health
    uses: appleboy/ssh-action@master
    with:
      host: ${{ secrets.EC2_IP }}
      username: ubuntu
      key: ${{ secrets.EC2_KEY }}
      script: |
        echo "🌐 Checking Backend API..."
        curl http://localhost:5000/api/health || echo "Backend not responding"

  # 15. Show Application URL
  - name: Show Application URL
    run: |
      echo "🚀 Application is live at:"
      echo "http://${{ secrets.EC2_IP }}"

  # 16. DAST Scan (OWASP ZAP)
  - name: OWASP ZAP Scan
    uses: zaproxy/action-full-scan@v0.7.0
    with:
      target: http://${{ secrets.EC2_IP }}
      fail_action: false
      artifact_name: zap-report
    continue-on-error: true
